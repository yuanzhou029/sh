name: 编译 Python 3.14 便携版

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.14.3'
  PYTHON_ARCHIVE: 'Python-3.14.3.tgz'
  PYTHON_URL: 'https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装构建依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential checkinstall \
          libssl-dev zlib1g-dev libbz2-dev \
          libreadline-dev libsqlite3-dev wget curl llvm \
          libncurses5-dev libncursesw5-dev libffi-dev \
          liblzma-dev tk-dev libgdbm-dev libc6-dev \
          libdb-dev libexpat1-dev liblzma-dev \
          libgdbm-dev libnss3-dev libncurses-dev \
          pkg-config xz-utils

    - name: 下载 Python ${{ env.PYTHON_VERSION }}
      run: |
        echo "正在下载 Python ${{ env.PYTHON_VERSION }}..."
        wget -q -O ${{ env.PYTHON_ARCHIVE }} '${{ env.PYTHON_URL }}'
        ls -lh ${{ env.PYTHON_ARCHIVE }}

    - name: 解压源码
      run: |
        tar xzf ${{ env.PYTHON_ARCHIVE }}
        ls -la

    - name: 配置 Python (便携版)
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        ./configure \
          --prefix=$(pwd)/../python-{{ env.PYTHON_VERSION }}-install \
          --enable-optimizations \
          LDFLAGS="-Wl,-rpath,\$ORIGIN/../lib,-rpath,\$ORIGIN/../lib/python{{ env.PYTHON_VERSION }}" \
          2>&1 | tail -10

    - name: 编译 Python
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        make -j$(nproc) 2>&1 | tail -5

    - name: 安装 Python 到临时目录
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        make install DESTDIR=$(pwd)/../python-{{ env.PYTHON_VERSION }}-staging

    - name: 修复库路径
      run: |
        cd python-{{ env.PYTHON_VERSION }}-staging/usr/local
        
        # 获取Python版本号
        PYVER=$(ls lib/ | grep '^python' | head -1)
        echo "Python版本: $PYVER"
        
        # 创建 lib 软链接（兼容某些系统）
        if [ ! -L "lib/$PYVER/config-$PYVER-x86_64-linux-gnu" ]; then
          mkdir -p "lib/$PYVER/config-$PYVER-x86_64-linux-gnu"
        fi
        
        ls -la lib/
        ls -la bin/

    - name: 创建便携版目录
      run: |
        # 创建目标目录
        mkdir -p python-{{ env.PYTHON_VERSION }}-portable
        
        # 移动安装内容
        mv python-{{ env.PYTHON_VERSION }}-staging/usr/local/* python-{{ env.PYTHON_VERSION }}-portable/
        
        # 复制Python可执行文件到bin
        cp python-{{ env.PYTHON_VERSION }}-portable/bin/python3.14 python-{{ env.PYTHON_VERSION }}-portable/bin/python
        cp python-{{ env.PYTHON_VERSION }}-portable/bin/pip3.14 python-{{ env.PYTHON_VERSION }}-portable/bin/pip
        
        ls -la python-{{ env.PYTHON_VERSION }}-portable/bin/

    - name: 验证便携版 Python
      run: |
        cd python-{{ env.PYTHON_VERSION }}-portable
        export LD_LIBRARY_PATH=$(pwd)/lib:$LD_LIBRARY_PATH
        export PATH=$(pwd)/bin:$PATH
        
        ./bin/python --version
        ./bin/pip --version

    - name: 创建 dist 目录
      run: mkdir -p dist

    - name: 编译 xoai-wheels
      env:
        LD_LIBRARY_PATH: $(pwd)/python-{{ env.PYTHON_VERSION }}-portable/lib
        PATH: $(pwd)/python-{{ env.PYTHON_VERSION }}-portable/bin:$PATH
      run: |
        export LD_LIBRARY_PATH=$(pwd)/python-{{ env.PYTHON_VERSION }}-portable/lib
        export PATH=$(pwd)/python-{{ env.PYTHON_VERSION }}-portable/bin:$PATH
        
        echo "=== 开始编译 xoai-wheels ==="
        echo "Python: $(which python)"
        echo "Python版本: $(python --version)"
        
        cd xoai-wheels
        pip install --upgrade pip setuptools wheel
        pip wheel . --no-binary :all: -w ../dist/
        
        cd ..
        echo ""
        echo "=== 编译完成 ==="
        ls -lh dist/

    - name: 打包便携版 Python
      run: |
        cd python-{{ env.PYTHON_VERSION }}-portable
        tar -czf ../dist/python-{{ env.PYTHON_VERSION }}-linux-x86_64.tar.gz *
        cd ..
        ls -lh dist/

    - name: 列出生成的文件
      run: |
        echo "=== 生成的发布文件 ==="
        ls -lh dist/

    - name: 清理构建目录
      run: |
        sudo rm -rf Python-{{ env.PYTHON_VERSION }} \
                   Python-{{ env.PYTHON_VERSION }}.tgz \
                   python-{{ env.PYTHON_VERSION }}-staging

    - name: 上传到 GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    - name: 保存 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-{{ env.PYTHON_VERSION }}-portable
        path: 'dist/*'
        retention-days: 30

    - name: 总结
      run: |
        echo "=== 发布总结 ==="
        echo ""
        echo "生成的文件:"
        ls -lh dist/
        echo ""
        echo "使用方法:"
        echo "1. 下载 python-{{ env.PYTHON_VERSION }}-linux-x86_64.tar.gz"
        echo "2. tar -xzf python-{{ env.PYTHON_VERSION }}-linux-x86_64.tar.gz"
        echo "3. cd python-{{ env.PYTHON_VERSION }}-portable"
        echo "4. export PATH=\$(pwd)/bin:\$PATH"
        echo "5. export LD_LIBRARY_PATH=\$(pwd)/lib:\$LD_LIBRARY_PATH"
        echo "6. pip install ../dist/xoai_wheels-*.whl"

name: 编译 Python 3.14 便携版

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.14.3'
  PYTHON_ARCHIVE: 'Python-3.14.3.tgz'
  PYTHON_URL: 'https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装构建依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential checkinstall \
          libssl-dev zlib1g-dev libbz2-dev \
          libreadline-dev libsqlite3-dev wget curl llvm \
          libncurses5-dev libncursesw5-dev libffi-dev \
          liblzma-dev tk-dev libgdbm-dev libc6-dev \
          libdb-dev libexpat1-dev \
          libgdbm-dev libnss3-dev libncurses-dev \
          pkg-config xz-utils

    - name: 下载并解压 Python
      run: |
        echo "正在下载 Python ${{ env.PYTHON_VERSION }}..."
        wget -q -O ${{ env.PYTHON_ARCHIVE }} '${{ env.PYTHON_URL }}'
        tar xzf ${{ env.PYTHON_ARCHIVE }}
        ls -la
        echo "目录名: $(ls -d Python-*)"

    - name: 配置、编译并安装 Python
      run: |
        PYTHON_DIR=$(ls -d Python-*)
        echo "进入目录: $PYTHON_DIR"
        cd "$PYTHON_DIR"
        
        # 配置（便携版：相对路径）
        ./configure \
          --prefix=../python-install \
          --enable-optimizations \
          2>&1 | tail -5
        
        # 编译
        make -j$(nproc) 2>&1 | tail -3
        
        # 安装到相对路径
        make install 2>&1 | tail -5
        
        cd ..
        ls -la python-install/

    - name: 创建便携版目录
      run: |
        mkdir -p python-portable
        mv python-install/* python-portable/
        
        # 复制快捷方式
        cp python-portable/bin/python3.14 python-portable/bin/python
        cp python-portable/bin/pip3.14 python-portable/bin/pip
        
        ls -la python-portable/bin/

    - name: 验证 Python
      run: |
        export LD_LIBRARY_PATH=$(pwd)/python-portable/lib:$LD_LIBRARY_PATH
        export PATH=$(pwd)/python-portable/bin:$PATH
        
        python --version
        pip --version

    - name: 创建 dist 目录并编译 wheels
      run: |
        export LD_LIBRARY_PATH=$(pwd)/python-portable/lib:$LD_LIBRARY_PATH
        export PATH=$(pwd)/python-portable/bin:$PATH
        
        mkdir -p dist
        
        # 升级 pip
        pip install --upgrade pip setuptools wheel
        
        echo "=== 编译 xoai-wheels ==="
        cd xoai-wheels
        pip wheel . --no-binary :all: -w ../dist/
        cd ..
        
        echo ""
        echo "=== 编译完成 ==="
        ls -lh dist/

    - name: 打包便携版 Python
      run: |
        tar -czf dist/python-{{ env.PYTHON_VERSION }}-linux-x86_64.tar.gz python-portable/*
        ls -lh dist/

    - name: 列出所有文件
      run: |
        echo "=== 最终生成的文件 ==="
        ls -lh dist/

    - name: 清理构建目录
      run: |
        sudo rm -rf Python-* python-install python-portable ${{ env.PYTHON_ARCHIVE }}
        ls -la

    - name: 上传到 GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 保存 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-{{ env.PYTHON_VERSION }}-portable
        path: 'dist/*'
        retention-days: 30

    - name: 使用说明
      run: |
        echo "=========================================="
        echo "Python ${{ env.PYTHON_VERSION }} 便携版已生成"
        echo "=========================================="
        echo ""
        echo "生成文件:"
        ls -lh dist/
        echo ""
        echo "使用方法:"
        echo "1. 下载 dist/ 目录下的所有文件"
        echo ""
        echo "2. 解压 Python:"
        echo "   tar -xzf python-{{ env.PYTHON_VERSION }}-linux-x86_64.tar.gz"
        echo ""
        echo "3. 配置环境变量:"
        echo "   export PATH=\$(pwd)/python-portable/bin:\$PATH"
        echo "   export LD_LIBRARY_PATH=\$(pwd)/python-portable/lib:\$LD_LIBRARY_PATH"
        echo ""
        echo "4. 验证安装:"
        echo "   python --version"
        echo ""
        echo "5. 安装预编译包:"
        echo "   pip install dist/xoai_wheels-*.whl"

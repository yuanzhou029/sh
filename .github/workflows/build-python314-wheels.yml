name: 编译 Python 3.14 Wheels

on:
  workflow_dispatch:
    inputs:
      packages:
        description: '包名（逗号分隔，留空使用packages.txt）'
        required: false
        default: ''
        type: string

env:
  PYTHON_VERSION: '3.14.3'
  PYTHON_ARCHIVE: 'Python-3.14.3.tgz'
  PYTHON_URL: 'https://www.python.org/ftp/python/3.14.3/Python-3.14.3.tgz'

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装构建依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential checkinstall \
          libssl-dev zlib1g-dev libbz2-dev \
          libreadline-dev libsqlite3-dev wget curl llvm \
          libncurses5-dev libncursesw5-dev libffi-dev \
          liblzma-dev tk-dev libgdbm-dev libc6-dev \
          libdb-dev libexpat1-dev liblzma-dev \
          libgdbm-dev libnss3-dev libncurses-dev \
          pkg-config xz-utils \
          libjpeg-dev zlib1g-dev libtiff-dev \
          libopenblas-dev liblapack-dev gfortran \
          cmake

    - name: 下载 Python ${{ env.PYTHON_VERSION }}
      run: |
        echo "正在下载 Python ${{ env.PYTHON_VERSION }}..."
        wget -q -O ${{ env.PYTHON_ARCHIVE }} '${{ env.PYTHON_URL }}'
        ls -lh ${{ env.PYTHON_ARCHIVE }}

    - name: 解压源码
      run: |
        tar xzf ${{ env.PYTHON_ARCHIVE }}
        ls -la

    - name: 配置并编译 Python
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        ./configure --enable-optimizations --prefix=/usr/local LDFLAGS="-Wl,-rpath,/usr/local/lib" 2>&1 | tail -20
        make -j$(nproc) 2>&1 | tail -10

    - name: 安装 Python
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        sudo make altinstall

    - name: 验证 Python
      run: |
        export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
        /usr/local/bin/python3.14 --version
        /usr/local/bin/pip3.14 --version

    - name: 配置 pip 和环境
      run: |
        export LD_LIBRARY_PATH=/usr/local/lib:$LD_LIBRARY_PATH
        /usr/local/bin/pip3.14 install --upgrade pip setuptools wheel build

    - name: 读取包列表
      id: config
      run: |
        if [ -n "${{ github.event.inputs.packages }}" ]; then
          PACKAGES="${{ github.event.inputs.packages }}"
        elif [ -f "python3.14-wheels/packages.txt" ]; then
          PACKAGES=$(grep -v '^#' python3.14-wheels/packages.txt | grep -v '^$' | tr '\n' ' ')
        else
          PACKAGES="pyyaml scipy pillow"
        fi
        echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
        echo "要编译的包: $PACKAGES"

    - name: 创建 wheelhouse 目录
      run: mkdir -p wheelhouse

    - name: 构建 Wheels
      if: steps.config.outputs.packages != ''
      env:
        LD_LIBRARY_PATH: /usr/local/lib:/usr/local/lib/python3.14/config-3.14-x86_64-linux-gnu
      run: |
        export LD_LIBRARY_PATH=/usr/local/lib:/usr/local/lib/python3.14/config-3.14-x86_64-linux-gnu:$LD_LIBRARY_PATH
        export PATH=/usr/local/bin:$PATH
        export MAKEFLAGS="-j$(nproc)"
        
        echo "=== 开始编译 Wheels ==="
        echo "PATH: $PATH"
        echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
        echo "Python: $(which python3.14)"
        echo "pip: $(which pip3.14)"
        echo "python3.14 --version: $(python3.14 --version)"
        echo ""
        
        for PKG in ${{ steps.config.outputs.packages }}; do
          echo ""
          echo "========== 正在编译: $PKG =========="
          
          # 清理之前的构建
          rm -rf /tmp/build_$PKG wheelhouse/$PKG-*.whl 2>/dev/null || true
          
          # 尝试源码编译
          echo "[1/2] 尝试源码编译..."
          if pip3.14 wheel \
            --no-deps \
            --no-binary :all: \
            "$PKG" \
            -w wheelhouse/ 2>&1; then
            echo "✓ $PKG 源码编译成功"
          else
            echo "[2/2] 尝试预编译 wheel..."
            if pip3.14 wheel \
              --no-deps \
              --only-binary :all: \
              "$PKG" \
              -w wheelhouse/ 2>&1; then
              echo "✓ $PKG 预编译成功"
            else
              echo "✗ $PKG 编译失败"
            fi
          fi
          
          echo ""
        done
        
        echo ""
        echo "=== 编译完成，检查结果 ==="
        ls -la wheelhouse/

    - name: 列出生成的文件
      run: |
        echo "=== 生成的 Wheel 文件 ==="
        ls -lh wheelhouse/ 2>/dev/null || echo "wheelhouse 目录为空"
        echo ""
        echo "文件数量: $(ls -1 wheelhouse/*.whl 2>/dev/null | wc -l)"

    - name: 清理构建目录
      run: |
        rm -rf Python-${{ env.PYTHON_VERSION }} ${{ env.PYTHON_ARCHIVE }}

    - name: 上传到 GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          wheelhouse/*.whl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 保存 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python314-wheels-${{ github.run_number }}
        path: 'wheelhouse/*.whl'
        retention-days: 30

    - name: 总结
      run: |
        echo "=== 编译总结 ==="
        echo "Python版本: ${{ env.PYTHON_VERSION }}"
        echo "包列表: ${{ steps.config.outputs.packages }}"
        echo ""
        if [ -d "wheelhouse" ]; then
          echo "生成文件:"
          ls -lh wheelhouse/
        fi

name: 编译 Python 3.14.3 Wheels

on:
  workflow_dispatch:
    inputs:
      packages:
        description: '包名（逗号分隔，留空使用packages.txt）'
        required: false
        default: ''
        type: string
  schedule:
    - cron: '0 2 * * 0'

env:
  PYTHON_VERSION: '3.14.3'
  PYTHON_URL: 'https://github.com/yuanzhou029/APK/releases/download/3.14.3/Python-3.14.3.tgz'

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装构建工具
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential checkinstall \
          libssl-dev zlib1g-dev libbz2-dev \
          libreadline-dev libsqlite3-dev wget curl llvm \
          libncurses5-dev libncursesw5-dev libffi-dev \
          liblzma-dev tk-dev libgdbm-dev libc6-dev \
          libdb-dev libexpat1-dev liblzma-dev \
          libgdbm-dev libnss3-dev libncurses-dev \
          pkg-config

    - name: 下载 Python ${{ env.PYTHON_VERSION }} 源码
      run: |
        echo "正在下载 Python ${{ env.PYTHON_VERSION }}..."
        wget -q -O Python-${{ env.PYTHON_VERSION }}.tar.xz "${{ env.PYTHON_URL }}"
        ls -lh Python-${{ env.PYTHON_VERSION }}.tar.xz

    - name: 解压源码包
      run: |
        tar xf Python-${{ env.PYTHON_VERSION }}.tar.xz
        ls -la Python-${{ env.PYTHON_VERSION }}/

    - name: 配置 Python 编译
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        ./configure --enable-optimizations --prefix=/usr/local --enable-shared

    - name: 编译 Python
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        make -j$(nproc)

    - name: 安装 Python
      run: |
        cd Python-${{ env.PYTHON_VERSION }}
        sudo make altinstall

    - name: 验证 Python 安装
      run: |
        /usr/local/bin/python3.14 --version
        /usr/local/bin/pip3.14 --version

    - name: 升级 pip
      run: |
        /usr/local/bin/pip3.14 install --upgrade pip setuptools wheel build

    - name: 读取包列表
      id: config
      run: |
        if [ -n "${{ github.event.inputs.packages }}" ]; then
          PACKAGES="${{ github.event.inputs.packages }}"
        elif [ -f "python3.14-wheels/packages.txt" ]; then
          PACKAGES=$(grep -v '^#' python3.14-wheels/packages.txt | grep -v '^$' | tr '\n' ' ')
        else
          echo "packages=numpy pandas scipy" >> $GITHUB_OUTPUT
          echo "使用默认包列表"
          exit 0
        fi
        echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
        echo "要编译的包: $PACKAGES"

    - name: 安装编译依赖
      run: |
        /usr/local/bin/pip3.14 install numpy scipy cython
        /usr/local/bin/pip3.14 install cibuildwheel auditwheel twine

    - name: 构建 Wheels
      if: steps.config.outputs.packages != ''
      env:
        PYTHON_EXECUTABLE: /usr/local/bin/python3.14
      run: |
        echo "=== 开始编译 Wheels ==="
        
        # 设置Python路径
        export PATH="/usr/local/bin:$PATH"
        export PYTHONPATH="/usr/local/lib/python3.14/site-packages"
        
        # 创建输出目录
        mkdir -p wheelhouse
        
        for PKG in ${{ steps.config.outputs.packages }}; do
          echo ""
          echo "正在编译: $PKG"
          
          # 尝试构建wheel
          if /usr/local/bin/pip3.14 wheel \
            --no-deps \
            --only-binary=:all: \
            "$PKG" \
            -w wheelhouse/ 2>/dev/null; then
            echo "✓ $PKG (预编译) 成功"
          elif /usr/local/bin/pip3.14 wheel \
            --no-deps \
            --no-binary=:all: \
            "$PKG" \
            -w wheelhouse/ 2>/dev/null; then
            echo "✓ $PKG (源码) 成功"
          else
            echo "✗ $PKG 失败，跳过"
          fi
        done
        
        echo ""
        echo "=== 编译完成 ==="
        ls -lh wheelhouse/

    - name: 列出生成的文件
      run: |
        echo "=== 生成的 Wheel 文件 ==="
        if [ -d "wheelhouse" ]; then
          ls -lh wheelhouse/
          echo ""
          echo "文件数量: $(ls -1 wheelhouse/*.whl 2>/dev/null | wc -l)"
        else
          echo "wheelhouse 目录不存在"
        fi

    - name: 修复 manylinux 兼容性问题
      if: false
      run: |
        if [ -d "wheelhouse" ] && [ "$(ls -1 wheelhouse/*.whl 2>/dev/null | wc -l)" -gt 0 ]; then
          cd wheelhouse
          for whl in *.whl; do
            echo "检查: $whl"
            python3 -m auditwheel show "$whl" || true
          done
        fi

    - name: 上传到 PyPI
      if: false
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        TWINE_REPOSITORY_URL: ${{ secrets.PYPI_URL }}
      run: |
        if [ -d "wheelhouse" ] && [ "$(ls -1 wheelhouse/*.whl 2>/dev/null | wc -l)" -gt 0 ]; then
          /usr/local/bin/pip3.14 install twine
          twine upload --skip-existing --repository-url "$TWINE_REPOSITORY_URL" wheelhouse/*.whl
        else
          echo "没有wheel文件需要上传"
        fi

    - name: 上传到 GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          wheelhouse/*.whl
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 保存为 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python314-wheels-${{ github.run_number }}
        path: 'wheelhouse/*.whl'
        retention-days: 30

    - name: 编译总结
      run: |
        echo "=== 编译总结 ==="
        echo "Python版本: ${{ env.PYTHON_VERSION }}"
        echo "包列表: ${{ steps.config.outputs.packages }}"
        echo ""
        if [ -d "wheelhouse" ]; then
          echo "生成文件:"
          ls -lh wheelhouse/
        fi
